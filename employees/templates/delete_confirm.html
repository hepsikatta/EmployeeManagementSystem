<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card p-4 shadow-sm text-center" style="max-width: 500px;">
        <h3 class="text-danger">Are you sure?</h3>
        <p class="my-3">Do you really want to remove <strong>{{ emp.first_name }} {{ emp.last_name }}</strong> from the system?</p>
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger w-100 mb-2">Yes, Delete</button>
            <a href="{% url 'dashboard' %}" class="btn btn-secondary w-100">Cancel</a>
        </form>
    </div>
</body>
</html>
