<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card p-4 shadow-sm">
            <h2 class="mb-4">Add New Employee</h2>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3"><label class="form-label">Employee ID</label><input type="text" name="employee_id" class="form-control" required></div>
                <div class="mb-3"><label class="form-label">First Name</label><input type="text" name="first_name" class="form-control" required></div>
                <div class="mb-3"><label class="form-label">Last Name</label><input type="text" name="last_name" class="form-control" required></div>
                <div class="mb-3"><label class="form-label">Email</label><input type="email" name="email" class="form-control" required></div>
                <div class="mb-3"><label class="form-label">Department</label><input type="text" name="department" class="form-control" required></div>
                <div class="mb-3"><label class="form-label">Designation</label><input type="text" name="designation" class="form-control" required></div>
                <div class="mb-3"><label class="form-label">Joining Date</label><input type="date" name="joining_date" class="form-control" required></div>
                <button type="submit" class="btn btn-success w-100">Save Employee</button>
                <a href="{% url 'dashboard' %}" class="btn btn-secondary w-100 mt-2">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>
